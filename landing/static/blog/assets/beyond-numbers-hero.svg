  <text x="200" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.08em">NUMBERS ONLY</text>

  <text x="70" y="118" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">Revenue</text>
  <text x="300" y="118" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">+20%</text>
  <line x1="60" y1="128" x2="340" y2="128" stroke="#1e2433" stroke-width="1"/>

  <text x="70" y="152" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">Op. Income</text>
  <text x="300" y="152" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">+50%</text>
  <line x1="60" y1="162" x2="340" y2="162" stroke="#1e2433" stroke-width="1"/>

  <text x="70" y="186" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">PER</text>
  <text x="300" y="186" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">10x</text>
  <line x1="60" y1="196" x2="340" y2="196" stroke="#1e2433" stroke-width="1"/>

  <text x="70" y="220" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">ROE</text>
  <text x="300" y="220" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">15%</text>

  <text x="200" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">"Undervalued?"</text>

  <!-- Arrow -->
  <line x1="385" y1="160" x2="425" y2="160" stroke="url(#red)" stroke-width="2" stroke-linecap="round"/>
  <polygon points="425,155 435,160 425,165" fill="#ea4647"/>

  <!-- Right: Full picture -->
  <rect x="440" y="50" width="320" height="220" rx="10" fill="rgba(234,70,71,0.04)" stroke="rgba(234,70,71,0.2)" stroke-width="1"/>
  <text x="600" y="82" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#ea4647" letter-spacing="0.08em">FULL PICTURE</text>

  <circle cx="470" cy="115" r="4" fill="#f87171"/>
  <text x="482" y="119" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e2e8f0">Op. Income includes one-off gain</text>

  <circle cx="470" cy="145" r="4" fill="#fb923c"/>
  <text x="482" y="149" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e2e8f0">Receivables aging over 6 months</text>

  <circle cx="470" cy="175" r="4" fill="#fbbf24"/>
  <text x="482" y="179" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e2e8f0">Hidden guarantees off-balance</text>

  <circle cx="470" cy="205" r="4" fill="#34d399"/>
  <text x="482" y="209" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e2e8f0">Audit opinion: Qualified</text>

  <circle cx="470" cy="235" r="4" fill="#8b5cf6"/>
  <text x="482" y="239" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#e2e8f0">MD&amp;A tone shifted to cautious</text>

  <!-- Title -->
