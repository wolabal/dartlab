<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" rx="12" fill="url(#bg2)"/>
  <rect x="0.5" y="0.5" width="799" height="399" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Same Numbers, Different Stories</text>

  <!-- Case 1 -->
  <rect x="40" y="56" width="350" height="75" rx="8" fill="rgba(100,116,139,0.05)" stroke="rgba(100,116,139,0.12)" stroke-width="1"/>
  <text x="55" y="77" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.06em">SURFACE</text>
  <text x="55" y="100" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">Operating Income  +50%</text>
  <text x="55" y="120" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">Looks like high growth</text>

  <text x="405" y="95" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#334155">→</text>

  <rect x="420" y="56" width="350" height="75" rx="8" fill="rgba(234,70,71,0.04)" stroke="rgba(234,70,71,0.15)" stroke-width="1"/>
  <text x="435" y="77" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ea4647" letter-spacing="0.06em">NOTES (37)</text>
  <text x="435" y="100" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e2e8f0">One-off asset disposal gain ₩80B</text>
  <text x="435" y="120" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#f87171">Core operating income actually declined</text>

  <!-- Case 2 -->
  <rect x="40" y="146" width="350" height="75" rx="8" fill="rgba(100,116,139,0.05)" stroke="rgba(100,116,139,0.12)" stroke-width="1"/>
  <text x="55" y="167" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.06em">SURFACE</text>
  <text x="55" y="190" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">Revenue  +20%</text>
  <text x="55" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">Solid revenue growth</text>

  <text x="405" y="185" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#334155">→</text>

  <rect x="420" y="146" width="350" height="75" rx="8" fill="rgba(251,146,60,0.04)" stroke="rgba(251,146,60,0.15)" stroke-width="1"/>
  <text x="435" y="167" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fb923c" letter-spacing="0.06em">NOTES (8) — RECEIVABLES AGING</text>
  <text x="435" y="190" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e2e8f0">7% of receivables overdue &gt;6 months</text>
  <text x="435" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fb923c">Cash not coming in — credit sales piling up</text>

  <!-- Case 3 -->
  <rect x="40" y="236" width="350" height="75" rx="8" fill="rgba(100,116,139,0.05)" stroke="rgba(100,116,139,0.12)" stroke-width="1"/>
  <text x="55" y="257" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.06em">SURFACE</text>
  <text x="55" y="280" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">Debt Ratio  50%</text>
  <text x="55" y="300" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">Healthy balance sheet</text>

  <text x="405" y="275" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#334155">→</text>

  <rect x="420" y="236" width="350" height="75" rx="8" fill="rgba(251,191,36,0.04)" stroke="rgba(251,191,36,0.15)" stroke-width="1"/>
  <text x="435" y="257" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" letter-spacing="0.06em">SEC. XI — CONTINGENT LIABILITIES</text>
  <text x="435" y="280" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e2e8f0">Guarantees + lawsuits = 40% of equity</text>
  <text x="435" y="300" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#fbbf24">Off-balance-sheet obligations are massive</text>

  <!-- Case 4 -->
  <rect x="40" y="326" width="350" height="55" rx="8" fill="rgba(100,116,139,0.05)" stroke="rgba(100,116,139,0.12)" stroke-width="1"/>
  <text x="55" y="347" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.06em">SURFACE</text>
  <text x="55" y="370" font-family="'JetBrains Mono', monospace" font-size="12" fill="#94a3b8">Net Income  Positive</text>

  <text x="405" y="355" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#334155">→</text>

  <rect x="420" y="326" width="350" height="55" rx="8" fill="rgba(52,211,153,0.04)" stroke="rgba(52,211,153,0.15)" stroke-width="1"/>
  <text x="435" y="347" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#34d399" letter-spacing="0.06em">AUDIT OPINION</text>
  <text x="435" y="370" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#34d399">Qualified — auditor found issues</text>
</svg>
