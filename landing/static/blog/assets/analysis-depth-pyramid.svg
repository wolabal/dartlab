<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050811"/>
      <stop offset="100%" stop-color="#0f1219"/>
    </linearGradient>
  </defs>

  <rect width="800" height="380" rx="12" fill="url(#bg3)"/>
  <rect x="0.5" y="0.5" width="799" height="379" rx="12" stroke="#1e2433" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">Depth of Analysis</text>
  <text x="400" y="54" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b">Most people stop at Level 1. The real insights are below.</text>

  <!-- Level 1 — widest bar -->
  <rect x="60" y="76" width="680" height="48" rx="8" fill="rgba(100,116,139,0.08)" stroke="rgba(100,116,139,0.2)" stroke-width="1"/>
  <text x="80" y="96" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.06em">LEVEL 1</text>
  <text x="80" y="114" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">Financial Statements</text>
  <text x="720" y="105" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Revenue, Income, ROE, PER</text>

  <!-- Level 2 -->
  <rect x="110" y="134" width="580" height="48" rx="8" fill="rgba(234,70,71,0.05)" stroke="rgba(234,70,71,0.2)" stroke-width="1"/>
  <text x="130" y="154" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#ea4647" letter-spacing="0.06em">LEVEL 2</text>
  <text x="130" y="172" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#f87171">Audit Opinion</text>
  <text x="670" y="163" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Can you trust the numbers?</text>

  <!-- Level 3 -->
  <rect x="160" y="192" width="480" height="48" rx="8" fill="rgba(251,146,60,0.05)" stroke="rgba(251,146,60,0.2)" stroke-width="1"/>
  <text x="180" y="212" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fb923c" letter-spacing="0.06em">LEVEL 3</text>
  <text x="180" y="230" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fdba74">Notes &amp; Footnotes</text>
  <text x="620" y="221" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Borrowings, inventory, provisions</text>

  <!-- Level 4 -->
  <rect x="210" y="250" width="380" height="48" rx="8" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <text x="230" y="270" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" letter-spacing="0.06em">LEVEL 4</text>
  <text x="230" y="288" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fde68a">Corporate Governance</text>
  <text x="570" y="279" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Who controls decisions?</text>

  <!-- Level 5 — narrowest -->
  <rect x="260" y="308" width="280" height="48" rx="8" fill="rgba(139,92,246,0.05)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
  <text x="280" y="328" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#8b5cf6" letter-spacing="0.06em">LEVEL 5</text>
  <text x="280" y="346" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a78bfa">Disclosure Text</text>
  <text x="520" y="337" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569">Why &amp; what's next?</text>

  <!-- Side annotation -->
  <line x1="48" y1="100" x2="48" y2="332" stroke="url(#bg3)" stroke-width="0"/>
  <text x="36" y="225" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#334155" transform="rotate(-90, 36, 225)" letter-spacing="0.1em">DEEPER INSIGHT</text>
  <line x1="28" y1="100" x2="28" y2="332" stroke="#1e2433" stroke-width="1"/>
  <polygon points="28,332 24,322 32,322" fill="#1e2433"/>
</svg>
