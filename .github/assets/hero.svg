<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0a09"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="16" fill="url(#bg)"/>

  <!-- Decorative bars (left) -->
  <rect x="40" y="60" width="3" height="80" rx="1.5" fill="url(#amber)" opacity="0.6"/>
  <rect x="50" y="45" width="3" height="110" rx="1.5" fill="url(#amber)" opacity="0.4"/>
  <rect x="60" y="70" width="3" height="60" rx="1.5" fill="url(#blue)" opacity="0.5"/>
  <rect x="70" y="50" width="3" height="100" rx="1.5" fill="url(#amber)" opacity="0.3"/>
  <rect x="80" y="65" width="3" height="70" rx="1.5" fill="url(#blue)" opacity="0.4"/>
  <rect x="90" y="55" width="3" height="90" rx="1.5" fill="url(#amber)" opacity="0.5"/>
  <rect x="100" y="75" width="3" height="50" rx="1.5" fill="url(#blue)" opacity="0.3"/>

  <!-- Main title -->
  <text x="140" y="105" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#textGrad)">DartLab</text>

  <!-- Vertical divider -->
  <line x1="420" y1="70" x2="420" y2="130" stroke="#292524" stroke-width="1"/>

  <!-- Tagline -->
  <text x="445" y="92" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#a8a29e">Read Beyond the Numbers</text>
  <text x="445" y="120" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="400" fill="#57534e">DART disclosure document analysis</text>

  <!-- Tags (right) -->
  <rect x="640" y="72" width="120" height="26" rx="13" fill="#292524"/>
  <text x="700" y="90" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#f59e0b" text-anchor="middle">Numbers</text>

  <rect x="640" y="105" width="120" height="26" rx="13" fill="#292524"/>
  <text x="700" y="123" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#3b82f6" text-anchor="middle">Text</text>

  <rect x="640" y="138" width="120" height="26" rx="13" fill="#292524"/>
  <text x="700" y="156" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" font-weight="600" fill="#a8a29e" text-anchor="middle">Timeline</text>
</svg>
