<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a09;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c1917;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="amber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="line-hist" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="line-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="area-amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.01" />
    </linearGradient>
    <linearGradient id="area-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.01" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="line-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="340" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="800" y2="120" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="800" y2="280" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="340" stroke="#a8a29e" stroke-width="0.5"/>
  </g>

  <!-- ===== UPPER: LOGO SECTION ===== -->

  <!-- Decorative bar chart (left) -->
  <g opacity="0.15" filter="url(#glow-filter)">
    <rect x="40" y="55" width="4" height="85" rx="2" fill="#f59e0b"/>
    <rect x="50" y="40" width="4" height="115" rx="2" fill="#fbbf24"/>
    <rect x="60" y="65" width="4" height="70" rx="2" fill="#3b82f6"/>
    <rect x="70" y="45" width="4" height="105" rx="2" fill="#f59e0b"/>
    <rect x="80" y="60" width="4" height="80" rx="2" fill="#60a5fa"/>
    <rect x="90" y="50" width="4" height="95" rx="2" fill="#fbbf24"/>
    <rect x="100" y="70" width="4" height="60" rx="2" fill="#3b82f6"/>
  </g>

  <!-- Decorative document icons (right) -->
  <g opacity="0.1">
    <rect x="700" y="40" width="28" height="36" rx="3" stroke="#f59e0b" stroke-width="1" fill="none"/>
    <line x1="706" y1="50" x2="722" y2="50" stroke="#f59e0b" stroke-width="1"/>
    <line x1="706" y1="56" x2="718" y2="56" stroke="#f59e0b" stroke-width="1"/>
    <line x1="706" y1="62" x2="720" y2="62" stroke="#f59e0b" stroke-width="1"/>

    <rect x="735" y="55" width="28" height="36" rx="3" stroke="#3b82f6" stroke-width="1" fill="none"/>
    <line x1="741" y1="65" x2="757" y2="65" stroke="#3b82f6" stroke-width="1"/>
    <line x1="741" y1="71" x2="753" y2="71" stroke="#3b82f6" stroke-width="1"/>
    <line x1="741" y1="77" x2="755" y2="77" stroke="#3b82f6" stroke-width="1"/>
  </g>

  <!-- Orbital rings -->
  <ellipse cx="350" cy="90" rx="280" ry="18" stroke="url(#accent)" stroke-width="0.6" fill="none" opacity="0.08"/>
  <ellipse cx="350" cy="90" rx="230" ry="32" stroke="url(#accent)" stroke-width="0.4" fill="none" opacity="0.05" transform="rotate(-4, 350, 90)"/>

  <!-- Main title -->
  <text x="140" y="112" font-family="'Inter', 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#amber-grad)" filter="url(#shadow)" letter-spacing="-1">DartLab</text>

  <!-- Tagline -->
  <text x="350" y="148" font-family="'Inter', 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif" font-size="13" fill="#a8a29e" text-anchor="middle" letter-spacing="5" font-weight="300">READ BEYOND THE NUMBERS</text>

  <!-- Decorative dots -->
  <circle cx="55" cy="25" r="2" fill="#f59e0b" opacity="0.3"/>
  <circle cx="85" cy="35" r="1.5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="740" cy="130" r="2" fill="#f59e0b" opacity="0.25"/>
  <circle cx="760" cy="140" r="1.5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="680" cy="30" r="1.5" fill="#fbbf24" opacity="0.2"/>

  <!-- ===== DIVIDER ===== -->
  <line x1="60" y1="175" x2="740" y2="175" stroke="url(#divider-grad)" stroke-width="1"/>

  <!-- ===== LOWER: DUAL TIMELINE GRAPH ===== -->

  <!-- Area fill for quantitative line -->
  <path d="M 60 265 Q 120 248, 170 258 Q 220 268, 280 250 Q 340 232, 390 248 Q 430 260, 480 245 L 480 305 L 60 305 Z" fill="url(#area-amber)" opacity="0.6"/>

  <!-- Quantitative data line (amber) -->
  <path d="M 60 265 Q 120 248, 170 258 Q 220 268, 280 250 Q 340 232, 390 248 Q 430 260, 480 245"
        stroke="url(#line-hist)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#line-glow)"/>

  <!-- Text change markers (blue) -->
  <path d="M 60 280 L 120 280 L 120 272 L 170 272 L 170 280 L 220 280 L 220 260 L 280 260 L 280 270 L 340 270 L 340 262 L 390 262 L 390 268 L 430 268 L 430 258 L 480 258"
        stroke="url(#line-text)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#line-glow)"/>

  <!-- Area fill for text line -->
  <path d="M 220 260 L 280 260 L 280 270 L 340 270 L 340 262 L 390 262 L 390 268 L 430 268 L 430 258 L 480 258 L 480 305 L 220 305 Z" fill="url(#area-blue)" opacity="0.4"/>

  <!-- Cross-validation zone marker -->
  <rect x="330" y="192" width="60" height="118" rx="4" fill="#f59e0b" opacity="0.04"/>
  <line x1="360" y1="192" x2="360" y2="310" stroke="#f59e0b" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.15"/>

  <!-- Quantitative data points -->
  <circle cx="170" cy="258" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="280" cy="250" r="3" fill="#f59e0b" opacity="0.65"/>
  <circle cx="390" cy="248" r="3.5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="480" cy="245" r="3.5" fill="#fbbf24" opacity="0.8"/>

  <!-- Text change points -->
  <circle cx="220" cy="260" r="2.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="340" cy="262" r="2.5" fill="#3b82f6" opacity="0.55"/>
  <circle cx="430" cy="258" r="2.5" fill="#60a5fa" opacity="0.6"/>

  <!-- Right side: continuation arrows -->
  <g opacity="0.25">
    <path d="M 500 245 L 550 238 L 600 242 L 650 230 L 700 235" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round"/>
    <path d="M 500 258 L 550 255 L 600 248 L 650 252 L 700 245" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-dasharray="6,4" stroke-linecap="round"/>
    <polygon points="700,235 694,230 694,240" fill="#f59e0b" opacity="0.5"/>
    <polygon points="700,245 694,240 694,250" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- Period labels on x-axis -->
  <text x="120" y="322" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="8" fill="#57534e" text-anchor="middle">Q1</text>
  <text x="220" y="322" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="8" fill="#57534e" text-anchor="middle">Q2</text>
  <text x="340" y="322" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="8" fill="#57534e" text-anchor="middle">Q3</text>
  <text x="460" y="322" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="8" fill="#57534e" text-anchor="middle">Q4</text>

  <!-- Legend -->
  <line x1="540" y1="280" x2="565" y2="280" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <text x="572" y="283" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#a8a29e">Financial Data</text>

  <line x1="540" y1="296" x2="565" y2="296" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <text x="572" y="299" font-family="'Inter', 'Segoe UI', sans-serif" font-size="9" fill="#a8a29e">Text Changes</text>

  <rect x="530" y="270" width="140" height="40" rx="6" stroke="#292524" stroke-width="0.5" fill="none" opacity="0.5"/>
</svg>
